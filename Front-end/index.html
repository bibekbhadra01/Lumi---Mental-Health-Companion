<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumi — Mental Health Companion</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/progressbar.js/1.0.1/progressbar.min.js"></script>

<link rel="stylesheet" href="style.css">


</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <img src="lumi-logo.jpeg" class="sidebar-logo">
      <div>
        <h2>Lumi</h2>
        <p>Mental Health Companion</p>
      </div>
    </div>

    <p class="features-title">FEATURES</p>

    <ul class="features-list">
      <li class="feature active">💬 General Chat</li>
      <li class="feature">🔥 Rant Mode</li>
      <li class="feature" id="breathingBtn">🌬️ Breathing</li>
      <li class="feature">🌸 Self-Care</li>
      <li class="feature" id="musicBtn">🎵 Music</li>
    </ul>

  </aside>


  <!-- MAIN AREA -->
  <main class="main">

    <div class="chat-container">

      <h1>How can I help you today?</h1>

      <div id="chatBox" class="chat-box"></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Chat here..." />
        <button id="sendBtn">Send</button>
      </div>

    </div>

    <div id="musicPlayer" style="display:none; margin-top:20px;">
      <iframe
        id="spotifyFrame"
        style="border-radius:12px"
        src=""
        width="100%"
        height="352"
        frameBorder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
    </div>

  </main>

</div>

<script src="script.js"></script>


</body>
</html>
