<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lumi — Mental Health Companion</title>
<link rel="stylesheet" href="style.css">

<script>

if (!localStorage.getItem("loggedIn")) {
  window.location.href = "index.html";
}

</script>

</head>

<script>
function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}
</script>

<body>

<div class="app">

  <!-- 🌿 SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <img src="logo.jpeg" class="sidebar-logo">
      <div>
        <h2>Lumi</h2>
        <p>Mental Health Companion</p>
      </div>
    </div>

    <p class="features-title">FEATURES</p>

    <ul class="features-list">
      <li class="feature active">💬 General Chat</li>
      <li class="feature">🔥 Rant Mode</li>
      <li class="feature">🌬️ Breathing</li>
      <li class="feature">🌸 Self-Care</li>
      <li class="feature">🎵 Music</li>
    </ul>

  </aside>


  <!-- 🌿 MAIN AREA -->
<main class="main">

  <div class="top-bar">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="center-area">

    <div class="chat-container">

      <h1 id="welcomeText"></h1>

      <div id="chatBox" class="chat-box"></div>

      <div class="chat-input">
        <input id="messageInput" placeholder="Chat here..." />
        <button id="sendBtn">Send</button>
      </div>

    </div>

  </div>

</main>

</div>

<script src="script.js"></script>

<script>

if (!localStorage.getItem("loggedIn")) {
  window.location.href = "index.html";
}

const name = localStorage.getItem("username");

document.getElementById("welcomeText").innerText =
  "Hello " + name + ", how can I help you today?";

function logout() {
  localStorage.removeItem("loggedIn");
  window.location.href = "index.html";
}

</script>

</body>
</html
